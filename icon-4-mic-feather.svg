<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Parakeet Web - Microphone with parakeet feather</title>
  <defs>
    <linearGradient id="featherGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="0.6" stop-color="#1F9D55"/>
      <stop offset="1" stop-color="#0F5132"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F7FA"/>
      <stop offset="1" stop-color="#B6C2CF"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="#102A43"/>

  <!-- Microphone -->
  <g transform="translate(128 130)">
    <rect x="-32" y="-72" width="64" height="104" rx="32" fill="url(#micGrad)" stroke="#0B1A2C" stroke-width="4"/>
    <!-- mic grille lines -->
    <line x1="-20" y1="-50" x2="20" y2="-50" stroke="#7B8AA0" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="-30" x2="20" y2="-30" stroke="#7B8AA0" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#7B8AA0" stroke-width="3" stroke-linecap="round"/>
    <!-- arc stand -->
    <path d="M -54 0 a 54 54 0 0 0 108 0" fill="none" stroke="#F5F7FA" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="54" x2="0" y2="78" stroke="#F5F7FA" stroke-width="8" stroke-linecap="round"/>
    <line x1="-22" y1="78" x2="22" y2="78" stroke="#F5F7FA" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Parakeet feather curling around the mic -->
  <g transform="translate(176 56) rotate(28)">
    <path d="M 0 0
             C 30 10 50 40 48 80
             C 46 110 25 130 -5 130
             C 5 100 18 70 18 40
             C 18 22 12 10 0 0 Z"
          fill="url(#featherGrad)" stroke="#0B1A2C" stroke-width="3"/>
    <!-- feather barbs -->
    <g stroke="#0B1A2C" stroke-width="1.5" opacity="0.6">
      <path d="M 14 14 L 6 22" fill="none"/>
      <path d="M 22 30 L 10 38" fill="none"/>
      <path d="M 28 50 L 12 56" fill="none"/>
      <path d="M 32 72 L 14 76" fill="none"/>
      <path d="M 30 94 L 12 96" fill="none"/>
    </g>
    <!-- feather rachis -->
    <path d="M 0 0 C 12 30 18 70 8 120" fill="none" stroke="#0B1A2C" stroke-width="2"/>
    <!-- accent yellow tip -->
    <path d="M -2 122 C 6 128 12 128 -8 132 Z" fill="#FFB938" stroke="#0B1A2C" stroke-width="2"/>
  </g>
</svg>
