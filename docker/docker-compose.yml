services:
  parakeetweb:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Run `npm audit --audit-level=high` at build time; fails the build on
        # any high-severity vulnerability. Set RUN_NPM_AUDIT=false in .env to
        # opt out (e.g. when a known CVE is triaged but not yet patched
        # upstream).
        RUN_NPM_AUDIT: ${RUN_NPM_AUDIT:-true}
        # Reproducible build: vite/rollup/esbuild honour SOURCE_DATE_EPOCH
        # for any embedded timestamp. Operators with a git checkout should
        # export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) before
        # `docker compose build` so two builds of the same commit emit
        # identical bytes. The published dist/.well-known/build-sums.txt
        # then lets users verify the live site against a rebuild.
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    restart: unless-stopped
    container_name: parakeetweb
    # Run as non-root (UID 1000, created in the Dockerfile). Combined with
    # cap_drop:ALL, no-new-privileges, and the read-only rootfs, this keeps
    # the blast radius of any RCE minimal. UID 1000 also matches the default
    # host user on most Linux distros so bind-mounted ./fallback_models is
    # readable without extra chown.
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem; writable paths are explicit below.
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /var/regex
      - /run/config
      # Caddy default config/data dirs (it tries to create these on start).
      - /config/caddy
      - /data/caddy
    volumes:
      # Local model fallback: bind-mount a host folder of ONNX files (flat
      # layout: vocab.txt + .onnx files directly inside) into the container,
      # then set LOCAL_MODEL_PATH below to the in-container target. Caddy
      # serves it under /models/. Pre-populate the host folder with e.g.:
      #   hf download istupakov/parakeet-tdt-0.6b-v3-onnx --local-dir /host/path
      # - /host/path/to/onnx-files:/models:ro

      # Custom dictation regex rules: uncomment and set the host path to a folder
      # containing your own CSV regex files (overrides the default Murmure download).
      # - /path/to/my/regex-csvs:/custom-regex:ro
    # Resource limits to mitigate denial-of-service risk.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_DEV_MODE=${VITE_DEV_MODE:-false}
      - VITE_ANALYTICS_URL=${VITE_ANALYTICS_URL}
      - VITE_ANALYTICS_WEBSITE_ID=${VITE_ANALYTICS_WEBSITE_ID}
      - VITE_DICTATION_DEVICE_SUPPORT=${VITE_DICTATION_DEVICE_SUPPORT:-true}
      - VITE_MODEL_REPO=${VITE_MODEL_REPO:-istupakov/parakeet-tdt-0.6b-v3-onnx}
      # Local model fallback: auto-enabled when LOCAL_MODEL_PATH is set.
      # Can also be forced on/off explicitly.
      - VITE_LOCAL_MODEL_FALLBACK=${VITE_LOCAL_MODEL_FALLBACK:-${LOCAL_MODEL_PATH:+true}}
      # Force local fallback: skip HuggingFace entirely and always serve weights
      # from /models/. Useful for troubleshooting the local-fallback path.
      - VITE_FORCE_LOCAL_MODEL_FALLBACK=${VITE_FORCE_LOCAL_MODEL_FALLBACK:-}
      # In-container path of the bind-mounted ONNX folder (must match the
      # container side of the volume above). Caddy serves this directory at
      # /models/. Leave unset to disable local fallback entirely.
      - LOCAL_MODEL_PATH=${LOCAL_MODEL_PATH:-}
      # Custom dictation regex source: GitLab repo URL or local path (e.g. /custom-regex)
      - DICTATION_REGEX_SOURCE=${DICTATION_REGEX_SOURCE:-}
      # Remote microphone signaling server (shares coturn with WebSend)
      - STUN_SERVER=${STUN_SERVER:-}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - TURN_CREDENTIAL_TTL=${TURN_CREDENTIAL_TTL:-3600}
      - TURN_TIMEOUT=${TURN_TIMEOUT:-15}
      - STUN_GOOGLE_FALLBACK=${STUN_GOOGLE_FALLBACK:-true}
      - TURNS_PORT=${TURNS_PORT:-}
      - SIGNALING_PORT=${SIGNALING_PORT:-3001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # F-142: forward operator HSTS / CSP overrides so the Caddyfile's
      # {$VITE_HSTS_*} / {$VITE_CSP_*} substitutions resolve to non-empty
      # values when set in .env. Without these the documented overrides
      # silently no-op and HSTS stays bare 1y / CSP stays at the baked-in
      # host allowlists.
      - VITE_HSTS_MAX_AGE=${VITE_HSTS_MAX_AGE:-}
      - VITE_HSTS_SUFFIX=${VITE_HSTS_SUFFIX:-}
      - VITE_CSP_SCRIPT_HOSTS=${VITE_CSP_SCRIPT_HOSTS:-}
      - VITE_CSP_CONNECT_HOSTS=${VITE_CSP_CONNECT_HOSTS:-}

  # ── coturn TURN relay server (optional) ─────────────────────────────
  # If you already run a coturn instance (e.g. for WebSend or Nextcloud Talk),
  # you can skip this service and point STUN_SERVER / TURN_SERVER / TURN_SECRET
  # to your existing server instead.
  #
  # To use this bundled coturn, uncomment the block below and set
  # TURN_SERVER, TURN_SECRET and TURN_EXTERNAL_IP in your .env file.
  # Without a TURN server the remote mic feature still works when direct
  # peer-to-peer WebRTC succeeds (same LAN), but will fail through
  # symmetric NAT or restrictive firewalls.
  # ─────────────────────────────────────────────────────────────────────
  # coturn:
  #   image: coturn/coturn:latest
  #   container_name: coturn
  #   ports:
  #     # Change 3478 if it conflicts with another coturn instance
  #     - "3478:3478/udp"
  #     - "3478:3478/tcp"
  #     - "49152-49161:49152-49161/udp"
  #   # To enable TURNS (TURN-over-TLS), remove --no-tls and add:
  #   #   --tls-listening-port=${TURNS_PORT:-8443}
  #   #   --cert=/etc/coturn/certs/cert.pem
  #   #   --pkey=/etc/coturn/certs/key.pem
  #   # Then mount the certificate files via a volume:
  #   #   volumes:
  #   #     - /path/to/certs:/etc/coturn/certs:ro
  #   # And expose the TURNS port:
  #   #     - "${TURNS_PORT:-8443}:${TURNS_PORT:-8443}/tcp"
  #   #
  #   # Docker NAT: --external-ip format is PUBLIC_IP/INTERNAL_IP.
  #   # 0.0.0.0 as internal means "all container interfaces" (correct for Docker).
  #   # NOTE: TURN_EXTERNAL_IP must be an IP address, NOT a hostname — coturn
  #   # does not resolve DNS for --external-ip.
  #   command: >
  #     -n
  #     --log-file=stdout
  #     --use-auth-secret
  #     --static-auth-secret=${TURN_SECRET}
  #     --fingerprint
  #     --no-multicast-peers
  #     --no-cli
  #     --no-dtls
  #     --no-tls
  #     --realm=parakeetweb
  #     --min-port=49152
  #     --max-port=49161
  #     --listening-port=3478
  #     --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
  #     --check-origin-consistency
  #     --cpus=1
  #   cap_drop:
  #     - ALL
  #   cap_add:
  #     - NET_BIND_SERVICE
  #   read_only: true
  #   tmpfs:
  #     - /tmp:size=10M,mode=1777
  #   privileged: false
  #   # coturn image runs as root by default; the other hardening measures mitigate this.
  #   user: "0:0"
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M
  #         cpus: '0.5'
