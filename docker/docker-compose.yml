services:
  parakeetweb:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Set to a HuggingFace repo ID (e.g. istupakov/parakeet-tdt-0.6b-v3-onnx)
        # to bake model weights into the image.  The build will fail if the
        # download fails, giving you immediate feedback.
        FALLBACK_MODEL_REPO: ${FALLBACK_MODEL_REPO:-}
        HF_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped
    container_name: parakeetweb
    user: node
    working_dir: /app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem for security; writable paths are explicit below
    read_only: true
    tmpfs:
      - /tmp
      - /home/node/.npm:uid=1000,gid=1000
    volumes:
      # Mount the entire project for library access, with as little write access as possible
      - ../app:/app:ro
      - ../app/package-lock.json:/app/package-lock.json:rw
      - ../app/ui:/app/ui:rw
      # Signaling server for remote microphone feature
      - ../signaling:/signaling:ro
      # Local model fallback: no manual volume mount needed when using
      # FALLBACK_MODEL_REPO build arg — the entrypoint symlinks automatically.

      # Custom dictation regex rules: uncomment and set the host path to a folder
      # containing your own CSV regex files (overrides the default Murmure download).
      # - /path/to/my/regex-csvs:/custom-regex:ro

      # Named volumes for node_modules to avoid platform conflicts
      - root-node-modules:/app/node_modules
      - react-modules:/app/ui/node_modules
    # Resource limits to mitigate denial-of-service risk
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_DEV_MODE=${VITE_DEV_MODE}
      - VITE_ALLOWED_HOST=${VITE_ALLOWED_HOST}
      - VITE_USE_POLLING=${VITE_USE_POLLING:-true}
      - VITE_ANALYTICS_URL=${VITE_ANALYTICS_URL}
      - VITE_ANALYTICS_WEBSITE_ID=${VITE_ANALYTICS_WEBSITE_ID}
      - VITE_MODEL_REPO=${VITE_MODEL_REPO:-istupakov/parakeet-tdt-0.6b-v3-onnx}
      # Local model fallback: auto-enabled when FALLBACK_MODEL_REPO is set.
      # Can also be forced on/off explicitly.
      - VITE_LOCAL_MODEL_FALLBACK=${VITE_LOCAL_MODEL_FALLBACK:-${FALLBACK_MODEL_REPO:+true}}
      # Custom dictation regex source: GitLab repo URL or local path (e.g. /custom-regex)
      - DICTATION_REGEX_SOURCE=${DICTATION_REGEX_SOURCE:-}
      # Remote microphone signaling server (shares coturn with WebSend)
      - STUN_SERVER=${STUN_SERVER:-}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - TURN_CREDENTIAL_TTL=${TURN_CREDENTIAL_TTL:-3600}
      - TURNS_PORT=${TURNS_PORT:-}
      - SIGNALING_PORT=${SIGNALING_PORT:-3001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}

volumes:
  root-node-modules:
  react-modules:
