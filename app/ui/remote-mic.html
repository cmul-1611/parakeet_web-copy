<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>ParakeetWeb - Remote Microphone</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1a1a2e" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #root { width: 100%; max-width: 400px; padding: 1rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Eruda mobile devtools: only loaded when ?debug=1 is in the URL.
         Note: room info is in the hash (#roomId:secret), so use a query
         param: /remote-mic.html?debug=1#ROOM:SECRET. Vendored from
         cdn.jsdelivr.net/npm/eruda@3/eruda.min.js, served locally with SRI. -->
    <script>
      (function() {
        try {
          if (new URL(location.href).searchParams.get('debug') !== '1') return;
        } catch (_) { return; }
        var script = document.createElement('script');
        script.src = '/js/eruda.min.js';
        script.integrity = 'sha384-F7xQBvh3l6dG/mMD6QPIeVmXtzWT4Ce3ZDu8ysPuzMWMx9bFOIMGnRPUhLuQipss';
        script.onload = function() { window.eruda.init(); };
        document.head.appendChild(script);
      })();
    </script>
    <script src="/config.js"></script>
    <script type="module" src="/src/remote-mic-entry.jsx"></script>
  </body>
</html>
