<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParakeetWeb</title>
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Load eruda mobile debugger ASAP on mobile devices to catch early errors -->
    <script>
      (function() {
        if (navigator.userAgent.match(/Android/i) || navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
          console.log('[Debug] Mobile device detected - loading eruda debugger');
          var script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/eruda';
          script.onload = function() {
            window.eruda.init();
            console.log('[Debug] Eruda mobile debugger initialized');
          };
          script.onerror = function() {
            console.warn('[Debug] Failed to load eruda');
          };
          document.head.appendChild(script);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
