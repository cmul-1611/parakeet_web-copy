<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParakeetWeb</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1a1a2e" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f6f7fb;
        color: #111827;
        min-height: 100vh;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a2e; color: #e0e0e0; }
      }
    </style>

    <!-- Eruda mobile devtools: only loaded when ?debug=1 is in the URL.
         Previously auto-loaded on every Android/iOS visit, which shipped
         ~200 KB of devtools UI to every mobile user and grew the post-XSS
         surface unnecessarily. Append ?debug=1 to opt in. -->
    <script>
      (function() {
        try {
          if (new URL(location.href).searchParams.get('debug') !== '1') return;
        } catch (_) { return; }
        var script = document.createElement('script');
        // Vendored from cdn.jsdelivr.net/npm/eruda@3/eruda.min.js, served locally with SRI.
        script.src = '/js/eruda.min.js';
        script.integrity = 'sha384-F7xQBvh3l6dG/mMD6QPIeVmXtzWT4Ce3ZDu8ysPuzMWMx9bFOIMGnRPUhLuQipss';
        script.onload = function() {
          window.eruda.init();
          console.log('[Debug] Eruda devtools initialized (?debug=1)');
        };
        script.onerror = function() {
          console.warn('[Debug] Failed to load eruda');
        };
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
