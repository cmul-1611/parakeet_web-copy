<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParakeetWeb</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1a1a2e" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f6f7fb;
        color: #111827;
        min-height: 100vh;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a2e; color: #e0e0e0; }
      }
    </style>

    <!-- Eruda mobile devtools: only loaded when ?debug=1 is in the URL.
         Previously auto-loaded on every Android/iOS visit, which shipped
         ~200 KB of devtools UI to every mobile user and grew the post-XSS
         surface unnecessarily. Append ?debug=1 to opt in.
         Loader is external + SRI-pinned so script-src can stay strict. -->
    <script src="/js/eruda-loader.js" integrity="sha384-QeM25c+y2Q4kDX92EqIJuYjwSdK5Mq2CO8qBALc9PN5lY//wa7w4eBxJqDbnB2WK" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
