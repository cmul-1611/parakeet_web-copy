<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Parakeet Web - Speech bubble with parakeet</title>
  <rect width="256" height="256" rx="48" fill="#1F9D55"/>

  <!-- Speech bubble -->
  <path d="M 40 56
           h 176
           a 24 24 0 0 1 24 24
           v 96
           a 24 24 0 0 1 -24 24
           h -86
           l -28 26
           l 6 -26
           h -68
           a 24 24 0 0 1 -24 -24
           v -96
           a 24 24 0 0 1 24 -24 Z"
        fill="#FFF8E7" stroke="#0F2A1F" stroke-width="5" stroke-linejoin="round"/>

  <!-- Parakeet inside bubble -->
  <g transform="translate(72 92)">
    <!-- body -->
    <ellipse cx="40" cy="44" rx="38" ry="30" fill="#3DDC84" stroke="#0F2A1F" stroke-width="4"/>
    <!-- head -->
    <circle cx="74" cy="28" r="22" fill="#3DDC84" stroke="#0F2A1F" stroke-width="4"/>
    <!-- wing -->
    <path d="M 18 36 Q 40 22 60 40 Q 42 56 22 52 Z" fill="#1F9D55" stroke="#0F2A1F" stroke-width="3" stroke-linejoin="round"/>
    <!-- beak -->
    <path d="M 92 26 L 108 30 L 92 36 Z" fill="#FFB938" stroke="#0F2A1F" stroke-width="3" stroke-linejoin="round"/>
    <!-- eye -->
    <circle cx="80" cy="22" r="4" fill="#0F2A1F"/>
    <circle cx="81" cy="21" r="1.4" fill="#fff"/>
    <!-- cheek -->
    <circle cx="68" cy="34" r="3.5" fill="#FF7A59" opacity="0.85"/>
    <!-- tail -->
    <path d="M 4 50 L -16 56 L 6 62 Z" fill="#1F9D55" stroke="#0F2A1F" stroke-width="3" stroke-linejoin="round"/>
    <!-- feet -->
    <line x1="32" y1="74" x2="32" y2="84" stroke="#0F2A1F" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="74" x2="50" y2="84" stroke="#0F2A1F" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Sound waves emerging from beak -->
  <g stroke="#0F2A1F" fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M 188 116 q 8 4 0 16"/>
    <path d="M 200 108 q 14 8 0 32"/>
    <path d="M 212 100 q 20 12 0 48"/>
  </g>
</svg>
