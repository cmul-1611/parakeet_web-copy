<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Parakeet Web - Parakeet head with microphone</title>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="1" stop-color="#1F9D55"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="#0F2A1F"/>

  <!-- Microphone body behind the bird -->
  <g transform="translate(128 150)">
    <rect x="-24" y="-50" width="48" height="78" rx="24" fill="#E8F5EE" stroke="#0F2A1F" stroke-width="4"/>
    <path d="M -42 0 a 42 42 0 0 0 84 0" fill="none" stroke="#E8F5EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="42" x2="0" y2="64" stroke="#E8F5EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="-18" y1="64" x2="18" y2="64" stroke="#E8F5EE" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Parakeet head silhouette in front -->
  <g transform="translate(96 84)">
    <path d="M 30 0
             C 70 0 90 30 90 60
             C 90 90 65 110 30 110
             C -10 110 -22 80 -10 55
             C -22 50 -22 30 -2 28
             C 4 10 14 0 30 0 Z"
          fill="url(#g1)" stroke="#0F2A1F" stroke-width="4"/>
    <!-- Beak -->
    <path d="M -10 55 L -34 60 L -10 70 Z" fill="#FFB938" stroke="#0F2A1F" stroke-width="4" stroke-linejoin="round"/>
    <!-- Eye -->
    <circle cx="22" cy="48" r="7" fill="#0F2A1F"/>
    <circle cx="24" cy="46" r="2" fill="#E8F5EE"/>
    <!-- Cheek dot -->
    <circle cx="8" cy="68" r="5" fill="#FF7A59" opacity="0.85"/>
  </g>
</svg>
