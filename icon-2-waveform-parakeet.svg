<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Parakeet Web - Waveform parakeet</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#0E3A2E"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg2)"/>

  <!-- Parakeet body (rounded teardrop facing right) -->
  <g transform="translate(128 128)">
    <path d="M -50 -20
             C -50 -55 -10 -70 25 -55
             C 55 -42 60 -10 50 15
             C 42 35 18 45 -10 38
             Z"
          fill="#3DDC84" stroke="#0B1F3A" stroke-width="4" stroke-linejoin="round"/>
    <!-- Wing accent -->
    <path d="M -22 -30
             C 2 -40 28 -30 38 -10
             C 22 -8 4 -12 -16 -18 Z"
          fill="#1F9D55"/>
    <!-- Beak -->
    <path d="M 55 -25 L 76 -18 L 55 -8 Z" fill="#FFB938" stroke="#0B1F3A" stroke-width="3" stroke-linejoin="round"/>
    <!-- Eye -->
    <circle cx="42" cy="-32" r="5" fill="#0B1F3A"/>
    <circle cx="43" cy="-33" r="1.5" fill="#fff"/>
    <!-- Tail morphs into a waveform extending left -->
    <g stroke="#3DDC84" stroke-width="5" stroke-linecap="round" fill="none">
      <line x1="-50" y1="-2" x2="-72" y2="-2"/>
      <line x1="-78" y1="-12" x2="-78" y2="8"/>
      <line x1="-90" y1="-22" x2="-90" y2="18"/>
      <line x1="-102" y1="-14" x2="-102" y2="10"/>
      <line x1="-114" y1="-6" x2="-114" y2="2"/>
    </g>
  </g>
</svg>
