services:
  parakeetweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parakeetweb
    user: node
    working_dir: /app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem for security; writable paths are explicit below
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Mount the entire project for library access, with as little write access as possible
      - ./app:/app:ro
      - ./app/package-lock.json:/app/package-lock.json:rw
      - ./app/ui:/app/ui:rw

      # Use named volumes for node_modules to avoid platform conflicts
      - ./data/react-modules:/app/ui/node_modules
      - ./data/root-node-modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_ALLOWED_HOST=${VITE_ALLOWED_HOST}
      - VITE_USE_POLLING=${VITE_USE_POLLING:-true}
      - VITE_ANALYTICS_URL=${VITE_ANALYTICS_URL}
      - VITE_ANALYTICS_WEBSITE_ID=${VITE_ANALYTICS_WEBSITE_ID}
      - VITE_MODEL_REPO=${VITE_MODEL_REPO:-istupakov/parakeet-tdt-0.6b-v3-onnx}
