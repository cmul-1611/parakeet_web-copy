services:
  parakeetweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parakeetweb
    user: node
    working_dir: /app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem for security; writable paths are explicit below
    read_only: true
    tmpfs:
      - /tmp
      - /home/node/.npm
    volumes:
      # Mount the entire project for library access, with as little write access as possible
      - ./app:/app:ro
      - ./app/package-lock.json:/app/package-lock.json:rw
      - ./app/ui:/app/ui:rw
      # Uncomment to enable local model fallback (see README.md)
      # - ./fallback_models/istupakov__parakeet-tdt-0.6b-v3-onnx:/app/ui/public/models/istupakov/parakeet-tdt-0.6b-v3-onnx:ro

      # Named volumes for node_modules to avoid platform conflicts
      - root-node-modules:/app/node_modules
      - react-modules:/app/ui/node_modules
    # Resource limits to mitigate denial-of-service risk
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_ALLOWED_HOST=${VITE_ALLOWED_HOST}
      - VITE_USE_POLLING=${VITE_USE_POLLING:-true}
      - VITE_ANALYTICS_URL=${VITE_ANALYTICS_URL}
      - VITE_ANALYTICS_WEBSITE_ID=${VITE_ANALYTICS_WEBSITE_ID}
      - VITE_MODEL_REPO=${VITE_MODEL_REPO:-istupakov/parakeet-tdt-0.6b-v3-onnx}
      # Local model fallback: serve model weights from this instance when
      # HuggingFace is blocked or unreachable. To use:
      #   1. hf download istupakov/parakeet-tdt-0.6b-v3-onnx --local-dir ./fallback_models/istupakov__parakeet-tdt-0.6b-v3-onnx
      #   2. Uncomment the volume and env var below
      # - VITE_LOCAL_MODEL_FALLBACK=true

volumes:
  root-node-modules:
  react-modules:
